<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gelukkige Verjaarsdag Zelme 💚</title>
  <style>
    html, body { margin: 0; width: 100%; height: 100%; }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: radial-gradient(circle at top, #d8ffcc, #b4f09a, #7ecf5b, #6fbf4a);
      background-attachment: fixed;
      color: #1f3d14;
      text-align: center;
      overflow-x: hidden;
    }

    .container {
      position: relative;
      z-index: 10;
      padding: 5vh 5vw 10vh 5vw;
      max-width: 1100px;
      margin: 0 auto;
    }

    h1 {
      font-size: clamp(2rem, 5vw, 3.2rem);
      margin-bottom: 5px;
      text-shadow: 0 0 12px rgba(255,255,255,0.6);
    }

    .subtitle {
      font-size: clamp(1rem, 3vw, 1.2rem);
      margin-bottom: 20px;
    }

    .heart {
      font-size: clamp(1.8rem, 4vw, 2.4rem);
      margin-bottom: 25px;
      animation: pulse 1.6s infinite;
    }

    @keyframes pulse {
      0% { transform: scale(1); }
      50% { transform: scale(1.18); }
      100% { transform: scale(1); }
    }

    /* -------- CAKE ICONS -------- */
    .cake-icon {
      position: absolute;
      font-size: 1.8rem;
      z-index: 1;
      pointer-events: none;
      animation: floatCake 20s infinite linear;
      opacity: 0.7;
      filter: drop-shadow(0 3px 5px rgba(0,0,0,0.2));
    }

    @keyframes floatCake {
      0% {
        transform: translateY(0) rotate(0deg);
        opacity: 0.7;
      }
      25% {
        transform: translateY(-15px) rotate(5deg);
        opacity: 0.9;
      }
      50% {
        transform: translateY(0) rotate(0deg);
        opacity: 0.7;
      }
      75% {
        transform: translateY(15px) rotate(-5deg);
        opacity: 0.9;
      }
      100% {
        transform: translateY(0) rotate(0deg);
        opacity: 0.7;
      }
    }

    /* -------- GRID LAYOUT -------- */
    .photo-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 15px;
      margin-top: 30px;
      position: relative;
      z-index: 2;
    }

    /* -------- PHOTO BOXES (clean, simple, dashed) -------- */
    .photo-slot {
      background: rgba(255,255,255,0.45);
      backdrop-filter: blur(4px);
      border: 2px dashed #1f7a1f;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #1f3d14;
      font-size: 0.9rem;
      padding: 0; /* removed padding so images can fill the frame */
      box-shadow: 0 6px 18px rgba(0,0,0,0.12);
      text-align: center;
      overflow: hidden; /* clips images neatly to the shape */
      position: relative;
    }

    /* Small cake in photo corners */
    .photo-slot::after {
      content: '🎂';
      position: absolute;
      bottom: 8px;
      right: 8px;
      font-size: 1rem;
      opacity: 0.6;
      z-index: 3;
    }

    /* Make all images automatically fill and crop nicely */
    .photo-slot img {
      width: 100%;
      height: 100%;
      object-fit: cover; /* fills frame without distortion */
      display: block;
      border-radius: inherit; /* keeps circles/rounded shapes */
    }

    /* -------- QUOTE BOXES (with styled boxes) -------- */
    .quote-slot {
      background: linear-gradient(135deg, rgba(255,255,255,0.75), rgba(224,255,224,0.85));
      border: 3px solid #2e8b57;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #0f2b1a;
      font-size: 1rem;
      font-style: italic;
      font-weight: 600;
      padding: 14px;
      box-shadow: 0 8px 22px rgba(0,0,0,0.15);
      text-align: center;
      position: relative;
      overflow: hidden;
    }

    /* Cake icon in quote boxes */
    .quote-slot::before {
      content: '🍰';
      position: absolute;
      top: 8px;
      left: 8px;
      font-size: 1.2rem;
      opacity: 0.5;
      z-index: 4;
    }

    /* Styled box effect for quotes */
    .quote-slot .quote-box {
      position: relative;
      padding: 10px;
      z-index: 2;
      width: 100%;
    }

    /* Top gradient border */
    .quote-slot .border-top {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 4px;
      background: linear-gradient(90deg, #2e8b57, #4caf50, #2e8b57);
      z-index: 1;
    }

    /* Bottom gradient border */
    .quote-slot .border-bottom {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 4px;
      background: linear-gradient(90deg, #2e8b57, #4caf50, #2e8b57);
      z-index: 1;
    }

    /* Corner accents */
    .quote-slot .corner {
      position: absolute;
      width: 20px;
      height: 20px;
      z-index: 3;
    }

    .quote-slot .corner-tl {
      top: 5px;
      left: 5px;
      border-top: 2px solid #2e8b57;
      border-left: 2px solid #2e8b57;
    }

    .quote-slot .corner-tr {
      top: 5px;
      right: 5px;
      border-top: 2px solid #2e8b57;
      border-right: 2px solid #2e8b57;
    }

    .quote-slot .corner-bl {
      bottom: 5px;
      left: 5px;
      border-bottom: 2px solid #2e8b57;
      border-left: 2px solid #2e8b57;
    }

    .quote-slot .corner-br {
      bottom: 5px;
      right: 5px;
      border-bottom: 2px solid #2e8b57;
      border-right: 2px solid #2e8b57;
    }

    /* Leaf decorations */
    .quote-slot .leaf {
      position: absolute;
      font-size: 1.2rem;
      z-index: 4;
    }

    .quote-slot .leaf-tl { top: 6px; left: 28px; }
    .quote-slot .leaf-tr { top: 6px; right: 8px; }
    .quote-slot .leaf-bl { bottom: 6px; left: 8px; }
    .quote-slot .leaf-br { bottom: 6px; right: 28px; }

    /* -------- SHAPES -------- */
    .tall {
      grid-row: span 2;
      min-height: 260px;
      border-radius: 40px 40px 10px 10px;
    }

    .wide {
      grid-column: span 2;
      min-height: 140px;
      border-radius: 20px 60px 20px 60px;
    }

    .circle {
      aspect-ratio: 1 / 1;
      border-radius: 50%;
    }

    .small {
      min-height: 120px;
      border-radius: 16px;
    }

    @media (max-width: 480px) {
      .wide { grid-column: span 1; }
      .tall { grid-row: span 1; }
      .cake-icon { font-size: 1.4rem; }
    }

    /* -------- BALLOONS -------- */
    .balloon {
      position: absolute;
      bottom: -180px;
      border-radius: 50% 50% 45% 45%;
      animation: floatUp linear infinite;
      opacity: 0.95;
      filter: drop-shadow(0 6px 8px rgba(0,0,0,0.2));
    }

    .balloon::after {
      content: '';
      position: absolute;
      bottom: -70px;
      left: 50%;
      width: 2px;
      height: 70px;
      background: #1f3d14;
    }

    @keyframes floatUp {
      from { transform: translateY(0) scale(1); }
      to { transform: translateY(-130vh) scale(1.02); }
    }

    #confetti-canvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      pointer-events: none;
      z-index: 5;
    }

    /* Cake emoji variations */
    .cake-1 { animation-delay: 0s; }
    .cake-2 { animation-delay: -5s; animation-duration: 25s; }
    .cake-3 { animation-delay: -10s; animation-duration: 30s; }
    .cake-4 { animation-delay: -15s; animation-duration: 35s; }
    .cake-5 { animation-delay: -20s; animation-duration: 40s; }
    .cake-6 { animation-delay: -25s; animation-duration: 45s; }
  </style>
</head>
<body>
  <canvas id="confetti-canvas"></canvas>

  <!-- Floating Cake Icons -->
  <div class="cake-icon cake-1" style="top: 10%; left: 5%;">🎂</div>
  <div class="cake-icon cake-2" style="top: 15%; right: 8%;">🍰</div>
  <div class="cake-icon cake-3" style="top: 30%; left: 3%;">🧁</div>
  <div class="cake-icon cake-4" style="top: 40%; right: 3%;">🎂</div>
  <div class="cake-icon cake-5" style="top: 60%; left: 7%;">🍰</div>
  <div class="cake-icon cake-6" style="top: 70%; right: 5%;">🧁</div>
  <div class="cake-icon cake-1" style="top: 85%; left: 10%;">🎂</div>
  <div class="cake-icon cake-2" style="top: 20%; left: 15%;">🍰</div>
  <div class="cake-icon cake-3" style="top: 50%; right: 10%;">🧁</div>
  <div class="cake-icon cake-4" style="top: 80%; right: 12%;">🎂</div>

  <div class="container">
    <h1>Gelukkige Verjaarsdag, Zelme! 💚</h1>
    <div class="subtitle">Jy maak die wêreld mooier net deur hier te wees.</div>
    <div class="heart">💚💚💚</div>

    <div class="photo-grid">
      <div class="quote-slot tall">
        <div class="border-top"></div>
        <div class="border-bottom"></div>
        <div class="corner corner-tl"></div>
        <div class="corner corner-tr"></div>
        <div class="corner corner-bl"></div>
        <div class="corner corner-br"></div>
        <div class="leaf leaf-tl">🍃</div>
        <div class="leaf leaf-br">🍃</div>
        <div class="quote-box">"Liefde laat alles blom."</div>
      </div>
      
      <div class="photo-slot circle"><img src="https://iili.io/fyqixVa.jpg"></div>
      
      <div class="quote-slot wide">
        <div class="border-top"></div>
        <div class="border-bottom"></div>
        <div class="corner corner-tl"></div>
        <div class="corner corner-tr"></div>
        <div class="corner corner-bl"></div>
        <div class="corner corner-br"></div>
        <div class="leaf leaf-tl">🍃</div>
        <div class="leaf leaf-br">🍃</div>
        <div class="quote-box">"Saam is elke dag 'n fees."</div>
      </div>
      
      <div class="photo-slot small"><img src="https://iili.io/fyqLv8Q.jpg"></div>
      <div class="photo-slot tall"><img src="https://iili.io/fyfeN8G.jpg"></div>
      
      <div class="quote-slot circle">
        <div class="border-top"></div>
        <div class="border-bottom"></div>
        <div class="corner corner-tl"></div>
        <div class="corner corner-tr"></div>
        <div class="corner corner-bl"></div>
        <div class="corner corner-br"></div>
        <div class="leaf leaf-tl">🍃</div>
        <div class="leaf leaf-br">🍃</div>
        <div class="quote-box">"Jy is my hart se huis."</div>
      </div>
      
      <div class="photo-slot wide"><img src="https://iili.io/fyqNnrg.jpg"></div>
      
      <div class="quote-slot small">
        <div class="border-top"></div>
        <div class="border-bottom"></div>
        <div class="corner corner-tl"></div>
        <div class="corner corner-tr"></div>
        <div class="corner corner-bl"></div>
        <div class="corner corner-br"></div>
        <div class="leaf leaf-tl">🍃</div>
        <div class="leaf leaf-br">🍃</div>
        <div class="quote-box">"Vandag vier ons jou!"</div>
      </div>
    </div>
  </div>

  <script>
    // --------- RAINBOW COLORS ---------
    const colors = [
      '#FF3B3B', '#FF8C00', '#FFD500', '#2BFF2B', '#1EC8FF', '#8A3BFF', '#FF3BE8'
    ];

    // --------- BALLOONS ---------
    function createBalloon() {
      const balloon = document.createElement('div');
      balloon.className = 'balloon';
      const size = 60 + Math.random() * 60;
      balloon.style.width = size + 'px';
      balloon.style.height = (size * 1.2) + 'px';
      balloon.style.left = Math.random() * 100 + 'vw';
      balloon.style.background = colors[Math.floor(Math.random() * colors.length)];
      balloon.style.animationDuration = (7 + Math.random() * 6) + 's';
      document.body.appendChild(balloon);
      setTimeout(() => balloon.remove(), 13000);
    }
    setInterval(createBalloon, 900);

    // --------- CONFETTI ---------
    const canvas = document.getElementById('confetti-canvas');
    const ctx = canvas.getContext('2d');

    function resizeCanvas() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    }
    resizeCanvas();
    window.addEventListener('resize', resizeCanvas);

    let confetti = [];
    function createConfetti(count = 220) {
      for (let i = 0; i < count; i++) {
        confetti.push({
          x: Math.random() * canvas.width,
          y: Math.random() * canvas.height - canvas.height,
          r: Math.random() * 6 + 2,
          d: Math.random() * 2 + 1,
          color: colors[Math.floor(Math.random() * colors.length)]
        });
      }
    }

    function drawConfetti() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      confetti.forEach(c => {
        ctx.beginPath();
        ctx.fillStyle = c.color;
        ctx.arc(c.x, c.y, c.r, 0, Math.PI * 2);
        ctx.fill();
        c.y += c.d;
        if (c.y > canvas.height) c.y = -10;
      });
      requestAnimationFrame(drawConfetti);
    }

    createConfetti();
    drawConfetti();

    // --------- ADD MORE CAKE ICONS DYNAMICALLY ---------
    function createCakeIcon() {
      const cake = document.createElement('div');
      cake.className = 'cake-icon';
      
      // Random cake type
      const cakes = ['🎂', '🍰', '🧁'];
      cake.textContent = cakes[Math.floor(Math.random() * cakes.length)];
      
      // Random position
      cake.style.left = Math.random() * 100 + 'vw';
      cake.style.top = Math.random() * 100 + 'vh';
      
      // Random animation delay and duration
      cake.style.animationDelay = '-' + (Math.random() * 30) + 's';
      cake.style.animationDuration = (20 + Math.random() * 25) + 's';
      
      // Random class for different animations
      const cakeClasses = ['cake-1', 'cake-2', 'cake-3', 'cake-4', 'cake-5', 'cake-6'];
      cake.classList.add(cakeClasses[Math.floor(Math.random() * cakeClasses.length)]);
      
      document.body.appendChild(cake);
      
      // Remove after a while and create new one
      setTimeout(() => {
        if (cake.parentNode) {
          cake.remove();
          createCakeIcon();
        }
      }, 30000 + Math.random() * 30000);
    }

    // Create initial floating cakes
    for (let i = 0; i < 8; i++) {
      setTimeout(() => createCakeIcon(), i * 1000);
    }
  </script>
</body>
</html>
